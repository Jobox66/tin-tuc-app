name: Tintuc Sync

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

# Prevent overlapping sync runs - cancel old job when new one starts
concurrency:
  group: news-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install newspaper3k lxml_html_clean nltk
          python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab')"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Verify environment
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: |
          echo "🔍 Checking environment variables..."
          if [ -z "$GOOGLE_SHEET_ID" ]; then echo "❌ GOOGLE_SHEET_ID is EMPTY"; exit 1; fi
          echo "✅ GOOGLE_SHEET_ID is set (length: ${#GOOGLE_SHEET_ID})"
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_EMAIL" ]; then echo "❌ GOOGLE_SERVICE_ACCOUNT_EMAIL is EMPTY"; exit 1; fi
          echo "✅ GOOGLE_SERVICE_ACCOUNT_EMAIL is set (length: ${#GOOGLE_SERVICE_ACCOUNT_EMAIL})"
          if [ -z "$GOOGLE_PRIVATE_KEY" ]; then echo "❌ GOOGLE_PRIVATE_KEY is EMPTY"; exit 1; fi
          echo "✅ GOOGLE_PRIVATE_KEY is set (length: ${#GOOGLE_PRIVATE_KEY})"
          echo "🔍 Python path: $(which python3)"

      - name: Run News Sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          PYTHON_PATH: python3
        run: |
          echo "🚀 Starting sync at $(date)"
          npm run sync
          echo "✅ Sync finished at $(date)"
